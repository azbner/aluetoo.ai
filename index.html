<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alu AI - Interface Universelle</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Icônes (Optionnel : Lucide ou FontAwesome pour correspondre aux boutons du CSS) -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- ÉCRAN D'ONBOARDING (Authentification sans friction) -->
    <div id="authOverlay" class="alu-backdrop" style="display: flex; align-items: center; justify-content: center; z-index: 100;">
        <div class="alu-lang-menu" style="width: min(400px, 90%); padding: 24px; max-height: none;">
            <h2 style="margin: 0 0 8px; text-align: center; background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">Bienvenue sur Alu AI</h2>
            <p style="color: var(--muted); font-size: 0.9rem; text-align: center; margin-bottom: 24px;">Connecte-toi en moins de 30 secondes</p>
            
            <!-- Connexions Sociales -->
            <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;">
                <button id="btnGoogleAuth" class="alu-nav-item" style="justify-content: center; background: var(--surface); border: 1px solid var(--border);">
                    <span>Continuer avec Google</span>
                </button>
                <button id="btnAppleAuth" class="alu-nav-item" style="justify-content: center; background: var(--surface); border: 1px solid var(--border);">
                    <span>Continuer avec Apple</span>
                </button>
            </div>

            <div style="text-align: center; color: var(--muted-dim); font-size: 0.8rem; margin-bottom: 20px;">OU</div>

            <!-- Alternative OTP -->
            <div id="otpStep1" style="display: flex; flex-direction: column; gap: 12px;">
                <input type="email" id="authEmail" placeholder="Ton adresse email" class="alu-textarea" style="border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px;">
                <button id="btnSendOTP" class="alu-new-chat" style="justify-content: center; margin: 0;">Recevoir un code unique</button>
            </div>

            <div id="otpStep2" style="display: none; flex-direction: column; gap: 12px;">
                <input type="text" id="authOTP" placeholder="Code à 6 chiffres" maxlength="6" class="alu-textarea" style="border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; text-align: center; letter-spacing: 4px;">
                <input type="text" id="authPseudo" placeholder="Ton nom / pseudo ?" class="alu-textarea" style="border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px;">
                <button id="btnVerifyOTP" class="alu-new-chat" style="justify-content: center; margin: 0;">Valider et Entrer</button>
            </div>
        </div>
    </div>

    <!-- APPLICATION PRINCIPALE -->
    <div class="alu-app">
        
        <!-- SIDEBAR -->
        <aside class="alu-sidebar" id="sidebar">
            <div class="alu-sidebar-top">
                <button class="alu-menu-btn" id="btnCloseSidebar" aria-label="Fermer la sidebar">✕</button>
                <div class="alu-brand">
                    <div class="alu-brand-icon">✨</div>
                    <div class="alu-brand-name">Alu AI</div>
                </div>
            </div>

            <button class="alu-new-chat" id="btnNewChat">
                <span>+</span> Nouveau chat
            </button>

            <!-- Navigation Rapide -->
            <div class="alu-nav-items">
                <button class="alu-nav-item">🧭 Explorer les prompts</button>
                <button class="alu-nav-item" id="btnToggleSettings">⚙️ Paramètres avancés</button>
            </div>

            <!-- Section Historique -->
            <div class="alu-history-section">
                <p class="alu-section-label">RÉCENTS</p>
                <div class="alu-history-list" id="historyList">
                    <!-- Injecté par JS -->
                    <div class="alu-history-empty">Aucune conversation</div>
                </div>
            </div>

            <!-- Bloc Utilisateur & Localisation -->
            <div class="alu-user-block">
                <div class="alu-user-row">
                    <div class="alu-avatar" id="userAvatar">U</div>
                    <div class="alu-user-info">
                        <p class="alu-user-name" id="profileName">Invité</p>
                    </div>
                    <button class="alu-settings-btn" id="btnLogout" title="Déconnexion">🚪</button>
                </div>
                
                <div class="alu-loc-block">
                    <div class="alu-loc-icon">📍</div>
                    <div>
                        <p class="alu-loc-name">Client-Side Engine</p>
                        <p class="alu-loc-desc">Exécution statique ultra-rapide sécurisée.</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ZONE PRINCIPALE (Chat + Canvas caché par défaut) -->
        <div style="display: flex; width: 100%; height: 100vh; overflow: hidden;">
            
            <!-- Fenêtre de Chat Traditionnelle -->
            <main class="alu-main" style="flex: 1; min-width: 0;">
                
                <!-- Topbar -->
                <header class="alu-topbar">
                    <div class="alu-topbar-left">
                        <button class="alu-menu-btn alu-mobile-menu" id="btnOpenSidebar">☰</button>
                        <div class="alu-topbar-brand" id="modelSelectorTrigger">
                            <span class="alu-topbar-title" id="activeModelLabel">Gemini Pro 2.5</span> ▾
                        </div>
                        
                        <!-- Menu déroulant des modèles -->
                        <div class="alu-model-menu" id="modelMenu" style="display: none;">
                            <button class="alu-model-opt active" data-model="gemini-fast">⚡ Modèle Rapide</button>
                            <button class="alu-model-opt" data-model="gemini-deep">🧠 Réflexion Profonde</button>
                            <div style="padding: 10px; border-top: 1px solid var(--border); margin-top: 4px;">
                                <label style="font-size: 0.75rem; color: var(--muted);">Créativité (Température)</label>
                                <input type="range" id="paramTemperature" min="0" max="1" step="0.1" value="0.7" style="width: 100%; accent-color: var(--accent); margin-top: 4px;">
                            </div>
                        </div>
                    </div>

                    <div class="alu-topbar-right">
                        <button class="alu-upgrade-btn" id="btnExportChat">
                            <span>Exporter</span>
                        </button>
                    </div>
                </header>

                <!-- Zone de flux conversationnel -->
                <div class="alu-conversation" id="conversationWrapper">
                    
                    <!-- Écran d'accueil si vide -->
                    <div class="alu-welcome" id="welcomeScreen">
                        <h1 class="alu-welcome-title">Que désires-tu créer ou analyser ?</h1>
                    </div>

                    <!-- Liste des messages -->
                    <div class="alu-messages" id="messagesContainer" style="display: none;">
                        <!-- Les messages et états d'activité seront générés ici par JS -->
                    </div>
                </div>

                <!-- Panneau d'options additionnelles : Hub de Raccourcis Slash / Prompts -->
                <div id="slashMenu" class="alu-lang-menu" style="display: none; position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); width: min(500px, 90%); z-index: 30;">
                    <div class="alu-lang-list">
                        <button class="alu-lang-opt" data-cmd="/corriger">📝 <strong>/corriger</strong> <span style="font-size:0.75rem; color:var(--muted)">Revoit l'orthographe et la syntaxe</span></button>
                        <button class="alu-lang-opt" data-cmd="/resumer">📊 <strong>/resumer</strong> <span style="font-size:0.75rem; color:var(--muted)">Synthétise le texte fourni</span></button>
                        <button class="alu-lang-opt" data-cmd="/code">💻 <strong>/code</strong> <span style="font-size:0.75rem; color:var(--muted)">Génère un composant d'UI isolé</span></button>
                    </div>
                </div>

                <!-- Zone d'input (Le Composer) -->
                <div class="alu-composer-wrap">
                    <div class="alu-composer" id="composerContainer">
                        
                        <!-- Barre supérieure d'aperçu des pièces jointes (Drag & Drop) -->
                        <div class="alu-attachments-strip" id="attachmentsStrip" style="display: none;">
                            <!-- Jetons injectés dynamiquement -->
                        </div>

                        <!-- Champ de saisie extensible auto-grow -->
                        <textarea class="alu-textarea" id="chatInput" placeholder="Pose une question ou glisse un fichier (PDF, Code, Image)..." rows="1"></textarea>

                        <!-- Barre d'outils inférieure -->
                        <div class="alu-composer-bar">
                            <div class="alu-composer-tools-left">
                                <button class="alu-tool-btn alu-attach-btn" id="btnAttachTrigger" title="Ajouter un fichier">📎</button>
                                <input type="file" id="hiddenFileInput" multiple style="display: none;">
                                <button class="alu-model-pill" id="currentSystemPromptIndicator" title="Instructions système actives">⚙️ Profil actif</button>
                            </div>
                            
                            <div class="alu-composer-tools-right">
                                <!-- Bouton Micro vocal -->
                                <button class="alu-tool-btn alu-mic-btn" id="btnMicInput" title="Saisie vocale en temps réel">🎤</button>
                                <!-- Bouton d'interruption du stream -->
                                <button class="alu-tool-btn" id="btnStopGeneration" style="display: none; color: #f87171;" title="Arrêter la génération">⏹️</button>
                                <!-- Bouton d'envoi -->
                                <button class="alu-send-btn" id="btnSendMessage" disabled aria-label="Envoyer le message">➔</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Prompt Starters d'idées au centre bas si vide -->
                    <div id="promptStarters" style="display: flex; gap: 10px; justify-content: center; margin-top: 14px; flex-wrap: wrap;">
                        <button class="alu-activity-pill" style="cursor:pointer;" data-prompt="Crée une page de tableau de bord moderne en HTML/CSS">📊 Dashboard UI HTML</button>
                        <button class="alu-activity-pill" style="cursor:pointer;" data-prompt="Résume-moi les piliers majeurs de l'architecture logicielle clean architecture">🧠 Clean Architecture</button>
                    </div>
                </div>

                <!-- Zone de configuration des Instructions Système -->
                <div id="systemPromptModal" class="alu-lang-menu" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: min(500px, 90%); padding: 16px; z-index: 60; box-shadow: 0 20px 50px rgba(0,0,0,0.6);">
                    <h3 style="margin-top: 0;">Instructions Système Personnalisées</h3>
                    <textarea id="systemPromptArea" class="alu-textarea" style="border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 12px; height: 100px;" placeholder="Exemple: Réponds toujours en français, sois concis et tutoie-moi."></textarea>
                    <div style="display: flex; justify-content: flex-end; gap: 10px;">
                        <button class="alu-activity-pill" id="btnCancelSysPrompt">Annuler</button>
                        <button class="alu-upgrade-btn" id="btnSaveSysPrompt" style="box-shadow: none;">Enregistrer</button>
                    </div>
                </div>

            </main>

            <!-- DOUBLE VOLET (Canvas / Panneau Artifacts pour documents longs ou code HTML) -->
            <section id="canvasPanel" style="display: none; width: 45%; border-left: 1px solid var(--border); background: var(--bg-elev); flex-direction: column; height: 100%;">
                <header style="display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border);">
                    <div style="display: flex; gap: 12px;">
                        <button id="btnCanvasTabCode" style="font-weight: 500; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 4px;">Code Source</button>
                        <button id="btnCanvasTabPreview" style="font-weight: 500; color: var(--text-soft); padding-bottom: 4px;">Aperçu en Direct</button>
                    </div>
                    <button id="btnCloseCanvas" class="alu-tool-btn" style="width:28px; height:28px;">✕</button>
                </header>
                <!-- Vue Code Source -->
                <div id="canvasCodeContainer" style="flex: 1; overflow: auto; padding: 16px; font-family: monospace; font-size: 0.85rem; color: #a6accd; background: #0d0e0f;">
                    <pre style="margin:0;"><code id="canvasCodeRaw"></code></pre>
                </div>
                <!-- Vue Sandbox isolée (Iframe) -->
                <div id="canvasPreviewContainer" style="flex: 1; background: white; display: none;">
                    <iframe id="sandboxIframe" sandbox="allow-scripts" style="width: 100%; height: 100%; border: 0;"></iframe>
                </div>
            </section>

        </div>
    </div>

    <!-- Script applicatif -->
    <script src="app.js"></script>
</body>
</html>
