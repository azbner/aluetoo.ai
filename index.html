<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aluetoo AI</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <script>
    tailwind.config = {
      corePlugins: { preflight: true }
    }
  </script>

  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#131314] text-[#e3e3e3]">

  <div id="auth-screen" class="fixed inset-0 bg-[#131314] z-50 flex items-center justify-center p-4">
    <div class="bg-[#1e1f20] border border-[#303133] p-8 rounded-2xl w-full max-w-md shadow-2xl">
      <div class="flex items-center gap-2 mb-6 justify-center">
        <span class="text-3xl" style="background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold;">✦</span>
        <h2 class="text-2xl font-medium tracking-tight" id="auth-title">Connexion à Aluetoo</h2>
      </div>

      <form id="auth-form" class="space-y-4">
        <div id="firstname-field" class="hidden">
          <label class="block text-xs text-[#9aa0a6] mb-1 font-medium">Prénom</label>
          <input type="text" id="auth-firstname" class="w-full bg-[#131314] border border-[#303133] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#8ab4f8]" placeholder="Léo">
        </div>
        <div>
          <label class="block text-xs text-[#9aa0a6] mb-1 font-medium">Adresse e-mail</label>
          <input type="email" id="auth-email" required class="w-full bg-[#131314] border border-[#303133] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#8ab4f8]" placeholder="nom@exemple.com">
        </div>
        <div>
          <label class="block text-xs text-[#9aa0a6] mb-1 font-medium">Mot de passe</label>
          <input type="password" id="auth-password" required class="w-full bg-[#131314] border border-[#303133] rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-[#8ab4f8]" placeholder="••••••••">
        </div>

        <button type="submit" id="auth-submit-btn" class="w-full bg-[#4285f4] hover:bg-[#357ae8] text-white rounded-xl py-3 text-sm font-medium transition mt-2">
          Se connecter
        </button>
      </form>

      <div class="mt-6 text-center text-xs text-[#9aa0a6]">
        <span id="auth-toggle-text">Pas encore de compte ?</span>
        <button id="auth-toggle-btn" class="text-[#8ab4f8] underline ml-1 focus:outline-none">Créer un compte</button>
      </div>
    </div>
  </div>

  <div class="alu-app hidden" id="app-container">
    
    <aside class="alu-sidebar">
      <div class="alu-sidebar-top">
        <button class="alu-menu-btn" id="mobile-sidebar-toggle">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <div class="alu-brand">
          <div class="alu-brand-icon" style="background: var(--gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.5rem; font-weight: bold;">✦</div>
          <span class="alu-brand-name">Aluetoo</span>
        </div>
      </div>

      <button class="alu-new-chat" id="new-chat-btn">
        <span class="material-symbols-outlined">add</span> Nouvelle conversation
      </button>

      <div class="alu-nav-items">
        <button class="alu-nav-item">
          <span class="material-symbols-outlined">search</span> Recherche de discussions
        </button>
        <button class="alu-nav-item">
          <span class="material-symbols-outlined">description</span> Bibliothèque
        </button>
      </div>

      <div class="alu-history-section">
        <p class="alu-section-label">Le dernier</p>
        <div class="alu-history-list" id="history-list">
          <div class="alu-history-empty">Aucune conversation</div>
        </div>
      </div>

      <div class="alu-activity">
        <button class="alu-nav-item">
          <span class="material-symbols-outlined">history</span> Activité
        </button>
      </div>

      <div class="alu-user-block">
        <div class="alu-user-row">
          <div class="alu-avatar" id="user-avatar" style="color: white; font-weight: bold; font-size: 0.85rem;">LC</div>
          <div class="alu-user-info">
            <p class="alu-user-name" id="user-display-name">Léo Ciach</p>
          </div>
          <button class="alu-settings-btn" id="logout-btn" title="Se déconnecter">
            <span class="material-symbols-outlined">logout</span>
          </button>
        </div>
        <div class="alu-loc-block">
          <span class="material-symbols-outlined" style="font-size: 16px; margin-top: 2px;">location_on</span>
          <div>
            <p class="alu-loc-name">Jette, Belgique</p>
            <p class="alu-loc-desc">En fonction de votre lieu de résidence</p>
            <button class="alu-loc-update">Mettre à jour l'emplacement</button>
          </div>
        </div>
      </div>
    </aside>

    <div class="alu-backdrop" id="sidebar-backdrop"></div>

    <main class="alu-main">
      
      <div class="alu-topbar">
        <div class="alu-topbar-left">
          <button class="alu-topbar-brand" id="model-menu-toggle">
            <span class="alu-topbar-title" id="current-model-title">Aluetoo Fast Lite ▾</span>
          </button>
          
          <div class="alu-model-menu hidden" id="model-dropdown">
            <button class="alu-model-opt active" data-model="fast-lite">
              ⚡ Aluetoo Fast Lite <span class="text-xs text-gray-500 ml-auto" id="count-fast-lite">(20/20)</span>
            </button>
            <button class="alu-model-opt" data-model="super-fast">
              🚀 Aluetoo Super Fast <span class="text-xs text-gray-500 ml-auto" id="count-super-fast">(10/10)</span>
            </button>
            <button class="alu-model-opt" data-model="pro">
              💎 Aluetoo Pro <span class="text-xs text-gray-500 ml-auto" id="count-pro">(5/5)</span>
            </button>
          </div>
        </div>
        <div class="alu-topbar-right">
          <button class="alu-upgrade-btn">
            <span class="material-symbols-outlined" style="font-size: 18px;">auto_awesome</span> Passez à une formule supérieure
          </button>
        </div>
      </div>

      <div class="alu-conversation" id="conversation-container">
        <div class="alu-welcome" id="welcome-screen">
          <h1 class="alu-welcome-title" id="welcome-text">Avez-vous de nouvelles idées ?</h1>
        </div>
        <div class="alu-messages" id="chat-messages"></div>
      </div>

      <div class="alu-composer-wrap">
        <div class="alu-composer" id="composer-box">
          <textarea class="alu-textarea" id="chat-input" placeholder="Demandez à Aluetoo" rows="1"></textarea>
          
          <div class="alu-composer-bar">
            <div class="alu-composer-tools-left">
              <button class="alu-tool-btn alu-attach-btn">
                <span class="material-symbols-outlined">add</span>
              </button>
              <button class="alu-tool-btn">
                <span class="material-symbols-outlined">image</span>
              </button>
            </div>
            <div class="alu-composer-tools-right" style="display: flex; align-items: center; gap: 12px;">
              <span class="alu-model-pill" id="input-model-indicator">⚡ Fast Lite</span>
              <button class="alu-send-btn" id="send-btn" style="background: #333537; color: #7a7e84;" disabled>
                <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const GROQ_API_KEY = "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";
    
    // Définition des modèles et configurations demandées
    const modelsConfig = {
      "fast-lite": { name: "Aluetoo Fast Lite", apiName: "llama-3.1-8b-instant", limit: 20, pill: "⚡ Fast Lite" },
      "super-fast": { name: "Aluetoo Super Fast", apiName: "llama-3.3-70b-versatile", limit: 10, pill: "🚀 Super Fast" },
      "pro": { name: "Aluetoo Pro", apiName: "openai/gpt-oss-120b", limit: 5, pill: "💎 Aluetoo Pro" }
    };

    let selectedModelKey = "fast-lite";
    let currentUser = null;
    let conversationHistory = [];

    // Récupère ou initialise les compteurs du jour depuis le LocalStorage
    function getUsage() {
      const today = new Date().toDateString();
      let data = localStorage.getItem(`alu_usage_${currentUser.email}`);
      if (!data) {
        data = { date: today, "fast-lite": 0, "super-fast": 0, "pro": 0 };
      } else {
        data = JSON.parse(data);
        if (data.date !== today) { // Reset si nouveau jour
          data = { date: today, "fast-lite": 0, "super-fast": 0, "pro": 0 };
        }
      }
      return data;
    }

    function saveUsage(usage) {
      localStorage.setItem(`alu_usage_${currentUser.email}`, JSON.stringify(usage));
      updateLimitCountersDisplay();
    }

    document.addEventListener("DOMContentLoaded", () => {
      setupAuth();
      setupUI();
    });

    // ─── Gestion Authentification ───
    function setupAuth() {
      const authScreen = document.getElementById("auth-screen");
      const appContainer = document.getElementById("app-container");
      const authForm = document.getElementById("auth-form");
      const authTitle = document.getElementById("auth-title");
      const authSubmitBtn = document.getElementById("auth-submit-btn");
      const authToggleBtn = document.getElementById("auth-toggle-btn");
      const authToggleText = document.getElementById("auth-toggle-text");
      const firstnameField = document.getElementById("firstname-field");
      
      let isSignUpMode = false;

      authToggleBtn.addEventListener("click", (e) => {
        e.preventDefault();
        isSignUpMode = !isSignUpMode;
        if (isSignUpMode) {
          authTitle.innerText = "Créer un compte Aluetoo";
          authSubmitBtn.innerText = "S'inscrire";
          authToggleText.innerText = "Déjà un compte ?";
          authToggleBtn.innerText = "Se connecter";
          firstnameField.classList.remove("hidden");
        } else {
          authTitle.innerText = "Connexion à Aluetoo";
          authSubmitBtn.innerText = "Se connecter";
          authToggleText.innerText = "Pas encore de compte ?";
          authToggleBtn.innerText = "Créer un compte";
          firstnameField.classList.add("hidden");
        }
      });

      authForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("auth-email").value.trim().toLowerCase();
        const password = document.getElementById("auth-password").value;
        
        if (isSignUpMode) {
          const firstname = document.getElementById("auth-firstname").value.trim() || "Utilisateur";
          currentUser = { firstname, email, password };
          localStorage.setItem(`user_${email}`, JSON.stringify(currentUser));
        } else {
          const savedUser = localStorage.getItem(`user_${email}`);
          if (savedUser) {
            const parsed = JSON.parse(savedUser);
            if (parsed.password === password) {
              currentUser = parsed;
            } else {
              alert("Mot de passe incorrect."); return;
            }
          } else {
            currentUser = { firstname: email.split('@')[0], email, password };
            localStorage.setItem(`user_${email}`, JSON.stringify(currentUser));
          }
        }
        
        localStorage.setItem("alu_session", JSON.stringify(currentUser));
        startApp();
      });

      const activeSession = localStorage.getItem("alu_session");
      if (activeSession) {
        currentUser = JSON.parse(activeSession);
        startApp();
      }
    }

    function startApp() {
      document.getElementById("auth-screen").classList.add("hidden");
      document.getElementById("app-container").classList.remove("hidden");
      
      document.getElementById("user-display-name").innerText = currentUser.firstname;
      document.getElementById("user-avatar").innerText = currentUser.firstname.substring(0,2).toUpperCase();
      document.getElementById("welcome-text").innerText = `Avez-vous de nouvelles idées ${currentUser.firstname} ?`;
      
      updateLimitCountersDisplay();
      checkGlobalLimits();
    }

    // ─── Vérification et Changement Auto de Modèle ───
    function checkGlobalLimits() {
      const usage = getUsage();
      const input = document.getElementById("chat-input");
      const composer = document.getElementById("composer-box");

      // Vérifier si le modèle actuel choisi est épuisé
      if (usage[selectedModelKey] >= modelsConfig[selectedModelKey].limit) {
        // Tenter de basculer automatiquement sur fast-lite s'il reste de la place
        if (selectedModelKey !== "fast-lite" && usage["fast-lite"] < modelsConfig["fast-lite"].limit) {
          switchModel("fast-lite");
          return;
        }

        // Si aucun repli possible ou que le modèle sélectionné reste épuisé
        input.disabled = true;
        input.value = "";
        input.placeholder = "Limite de messages atteinte. Changez de modèle.";
        composer.style.opacity = "0.6";
        
        // Si TOUS les modèles sont épuisés
        if (usage["fast-lite"] >= 20 && usage["super-fast"] >= 10 && usage["pro"] >= 5) {
          input.placeholder = "Limite de tous les modèles atteinte.";
          input.disabled = true;
        }
      } else {
        input.disabled = false;
        input.placeholder = "Demandez à Aluetoo";
        composer.style.opacity = "1";
      }
    }

    function updateLimitCountersDisplay() {
      const usage = getUsage();
      document.getElementById("count-fast-lite").innerText = `(${modelsConfig["fast-lite"].limit - usage["fast-lite"]}/${modelsConfig["fast-lite"].limit})`;
      document.getElementById("count-super-fast").innerText = `(${modelsConfig["super-fast"].limit - usage["super-fast"]}/${modelsConfig["super-fast"].limit})`;
      document.getElementById("count-pro").innerText = `(${modelsConfig["pro"].limit - usage["pro"]}/${modelsConfig["pro"].limit})`;
    }

    function switchModel(key) {
      selectedModelKey = key;
      document.getElementById("current-model-title").innerText = modelsConfig[key].name + " ▾";
      document.getElementById("input-model-indicator").innerText = modelsConfig[key].pill;
      
      document.querySelectorAll(".alu-model-opt").forEach(btn => {
        btn.classList.toggle("active", btn.getAttribute("data-model") === key);
      });
      
      checkGlobalLimits();
    }

    // ─── Interface et Événements ───
    function setupUI() {
      const modelToggle = document.getElementById("model-menu-toggle");
      const modelDropdown = document.getElementById("model-dropdown");
      const input = document.getElementById("chat-input");
      const sendBtn = document.getElementById("send-btn");

      modelToggle.addEventListener("click", () => modelDropdown.classList.toggle("hidden"));
      
      document.querySelectorAll(".alu-model-opt").forEach(opt => {
        opt.addEventListener("click", (e) => {
          switchModel(e.currentTarget.getAttribute("data-model"));
          modelDropdown.classList.add("hidden");
        });
      });

      // Contrôle bouton envoi actif
      input.addEventListener("input", () => {
        if (input.value.trim().length > 0 && !input.disabled) {
          sendBtn.disabled = false;
          sendBtn.style.background = "white";
          sendBtn.style.color = "#0d0e0f";
        } else {
          sendBtn.disabled = true;
          sendBtn.style.background = "#333537";
          sendBtn.style.color = "#7a7e84";
        }
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey && !sendBtn.disabled) {
          e.preventDefault();
          handleSendMessage();
        }
      });

      sendBtn.addEventListener("click", handleSendMessage);
      document.getElementById("new-chat-btn").addEventListener("click", () => {
        document.getElementById("chat-messages").innerHTML = "";
        conversationHistory = [];
        document.getElementById("welcome-screen").classList.remove("hidden");
      });

      document.getElementById("logout-btn").addEventListener("click", () => {
        localStorage.removeItem("alu_session");
        window.location.reload();
      });

      // Fermeture automatique des menus contextuels au clic ailleurs
      window.addEventListener("click", (e) => {
        if (!modelToggle.contains(e.target)) modelDropdown.classList.add("hidden");
      });

      // Sidebar Mobile Responsive Toggle
      const mobileSidebarBtn = document.getElementById("mobile-sidebar-toggle");
      const sidebar = document.querySelector(".alu-sidebar");
      const backdrop = document.getElementById("sidebar-backdrop");

      if (mobileSidebarBtn) {
        mobileSidebarBtn.addEventListener("click", () => {
          sidebar.classList.toggle("open");
          backdrop.classList.toggle("hidden");
        });
      }
    }

    // ─── Envoi et Gestion API Groq ───
    async function handleSendMessage() {
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text) return;

      // Double vérification des limites avant traitement
      const usage = getUsage();
      if (usage[selectedModelKey] >= modelsConfig[selectedModelKey].limit) {
        checkGlobalLimits();
        return;
      }

      // Incrémentation immédiate du compteur du modèle utilisé
      usage[selectedModelKey] += 1;
      saveUsage(usage);

      input.value = "";
      document.getElementById("send-btn").disabled = true;
      document.getElementById("send-btn").style.background = "#333537";
      document.getElementById("send-btn").style.color = "#7a7e84";
      document.getElementById("welcome-screen").classList.add("hidden");

      // Injection du message utilisateur dans l'interface
      appendMessageUI("user", text);
      conversationHistory.push({ role: "user", content: text });
      updateSidebarHistory(text);

      // Préparation de la bulle d'attente de l'assistant
      const aiBubble = appendMessageUI("assistant", "...");
      const container = document.getElementById("conversation-container");
      container.scrollTop = container.scrollHeight;

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${GROQ_API_KEY}`
          },
          body: JSON.stringify({
            model: modelsConfig[selectedModelKey].apiName,
            messages: [
              { role: "system", content: "Tu es Aluetoo AI, un assistant intelligent à l'interface épurée." },
              ...conversationHistory
            ],
            temperature: 0.7
          })
        });

        const data = await response.json();
        
        if (data.error && data.error.message.includes("model")) {
          // Gestion des cas spécifiques d'erreurs de serveurs distants (ex: gpt-oss-120b simulé)
          aiBubble.querySelector(".alu-msg-content").innerText = `Le modèle distant "${modelsConfig[selectedModelKey].apiName}" n'a pas pu être joint par la passerelle Groq.`;
        } else {
          const reply = data.choices[0].message.content;
          aiBubble.querySelector(".alu-msg-content").innerText = reply;
          conversationHistory.push({ role: "assistant", content: reply });
        }

      } catch (err) {
        console.error(err);
        aiBubble.querySelector(".alu-msg-content").innerText = "Erreur réseau. Impossible de contacter le serveur Aluetoo.";
      }

      container.scrollTop = container.scrollHeight;
      checkGlobalLimits(); // Ré-évaluation de la saisie après envoi
    }

    function appendMessageUI(sender, text) {
      const holder = document.getElementById("chat-messages");
      const wrapper = document.createElement("div");
      wrapper.className = `alu-msg alu-msg-${sender}`;

      if (sender === "assistant") {
        wrapper.innerHTML = `
          <div class="alu-msg-avatar" style="background: var(--gradient); border:none; color:white; font-size:12px; font-weight:bold;">✦</div>
          <div class="alu-msg-body">
            <div class="alu-msg-content"><p>${text}</p></div>
          </div>
        `;
      } else {
        wrapper.innerHTML = `
          <div class="alu-msg-body">
            <div class="alu-msg-content"><p>${text}</p></div>
          </div>
        `;
      }
      holder.appendChild(wrapper);
      return wrapper;
    }

    function updateSidebarHistory(msg) {
      const list = document.getElementById("history-list");
      const empty = list.querySelector(".alu-history-empty");
      if (empty) empty.remove();

      if (list.children.length > 0 && conversationHistory.length > 2) return;

      const title = msg.length > 20 ? msg.substring(0, 20) + "..." : msg;
      const item = document.createElement("div");
      item.className = "alu-history-item active";
      item.innerHTML = `
        <button class="alu-history-title-btn">
          <span class="alu-history-title-text">💬 ${title}</span>
        </button>
      `;
      list.insertBefore(item, list.firstChild);
    }
  </script>
</body>
</html>
